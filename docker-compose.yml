# Framinator — base compose (build + env). Pair with an overlay:
#   docker-compose.dev.yml  → https://dev-framinator.skarpa.dev (+ native PR previews on same Coolify app)
#   docker-compose.prod.yml → https://framinator.skarpa.dev (manual release)
# Set GEMINI_API_KEY (+ optional GEMINI_API_KEY_FALLBACK) in Coolify UI or a local .env file.

services:
  framinator:
    build: .
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_FALLBACK: ${GEMINI_API_KEY_FALLBACK:-}
