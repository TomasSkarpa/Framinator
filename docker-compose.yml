# Framinator — base compose (build + env). Pair with an overlay:
#   docker-compose.dev.yml     → https://dev-framinator.skarpa.dev (Coolify dev, develop, auto-deploy)
#   docker-compose.prod.yml    → https://framinator.skarpa.dev (Coolify prod, manual release)
#   docker-compose.preview.yml → https://<branch>.framinator.skarpa.dev (Coolify previews via GH Actions)
# Set GEMINI_API_KEY (+ optional GEMINI_API_KEY_FALLBACK) in Coolify UI or a local .env file.

services:
  framinator:
    build: .
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_FALLBACK: ${GEMINI_API_KEY_FALLBACK:-}
