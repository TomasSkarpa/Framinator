# Preview overlay: routing comes from Coolify (Preview Deployments + branch URL template).
# Used by framinator-previews Coolify project. Do not add fixed Traefik Host() labels here;
# Coolify injects https://<branch-slug>.framinator.skarpa.dev per preview deploy.

services:
  framinator:
    build: .
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_FALLBACK: ${GEMINI_API_KEY_FALLBACK:-}
    networks:
      - coolify

networks:
  coolify:
    external: true
